name: editflow
description: "Freelance project management for video editors"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  connectivity_plus: ^6.1.2
  url_launcher: ^6.3.2
  share_plus: any
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^8.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/google_logo.png
    - assets/images/whatsapp_logo.png
    - assets/images/app_logo.png
